name: Deploy hydraulikzielonka.pl

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "deploy-hydraulikzielonka"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro)
        run: npm run build

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          timeout: 30000
          exclude: |
            **/.git*
            **/.git*/**
            **/src/**
            **/node_modules/**
